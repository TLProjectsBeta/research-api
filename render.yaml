services:
  - type: web
    name: research-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false        # means you'll set this manually in dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: research-api-prod
      - key: DEBUG
        value: "false"
      - key: API_KEYS
        sync: false
      - key: REDIS_URL
        sync: false        # you'll get this from Redis provider